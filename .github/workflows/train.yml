name: Train Model

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      model-artifact:
        description: "Trained model artifact"
        value: trained-model

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train segment classifier
        run: python 02-experiment-tracking/train.py

      - name: Train revenue predictor
        run: python 02-experiment-tracking/train_revenue.py

      - name: Upload trained models as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/